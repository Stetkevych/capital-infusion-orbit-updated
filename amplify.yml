version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18
        - nvm use 18
        - cd client && npm ci
    build:
      commands:
        - export CI=false
        - export DISABLE_ESLINT_PLUGIN=true
        - export GENERATE_SOURCEMAP=false
        - cd client && npm run build
  artifacts:
    baseDirectory: client/build
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*
