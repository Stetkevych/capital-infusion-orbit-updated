version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 18
        - cd client && npm install
    build:
      commands:
        - cd client && CI=false npm run build
  artifacts:
    baseDirectory: client/build
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*
